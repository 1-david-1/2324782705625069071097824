<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Tipps für Sicherheitsunternehmen – InboxElevate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/tipps.css">
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <a href="/" class="logo">
      <svg viewBox="0 0 40 40" fill="none" style="width:30px;">
        <path d="M8 32L34 8M34 8L14 6M34 8L32 28" stroke="#1dba6e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M34 8L20 22" stroke="#1dba6e" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M20 22L18 32L23 26" stroke="#1dba6e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      InboxElevate
    </a>
    <ul class="nav-links">
      <li><a href="/">Start</a></li>
      <li><a href="/leistungen">Leistungen</a></li>
      <li><a href="/prozess">Prozess</a></li>
      <li><a href="/ueber-uns">Über uns</a></li>
      <li><a href="/tipps" class="active">Tipps</a></li>
      <li><a href="/kontakt" class="nav-cta">Kontakt <span class="nav-arrow">→</span></a></li>
    </ul>
    <button class="ham" id="ham" onclick="document.getElementById('mobMenu').classList.toggle('open')"><span></span><span></span><span></span></button>
  </nav>

  <div class="mob-menu" id="mobMenu">
    <a href="/">Start</a>
    <a href="/leistungen">Leistungen</a>
    <a href="/prozess">Prozess</a>
    <a href="/ueber-uns">Über uns</a>
    <a href="/tipps">Tipps</a>
    <a href="/kontakt" style="color:var(--green)">Kontakt →</a>
  </div>

  <main class="tipps-layout">
    <aside class="tipps-sidebar">
      <h2 class="tipps-sidebar-title">Kategorien filtern</h2>
      <div class="tipps-filter-list" id="tippsFilters">
        <!-- JS renders filters here -->
      </div>
    </aside>

    <div class="tipps-content">
      <div class="tipps-header">
        <h1>Resource Center</h1>
        <p class="tipps-count" id="tippsCount">Alle Tipps laden...</p>
      </div>
      <div class="tipps-grid" id="tippsGrid">
        <!-- JS renders cards here -->
      </div>
    </div>
  </main>

  <div class="tipp-modal" id="tippModal" role="dialog" aria-modal="true">
    <div class="tipp-modal-content">
      <button class="tipp-modal-close" id="tippModalClose" aria-label="Schließen">×</button>
      <div class="tipp-modal-hero">
        <div class="tipp-category" id="modalCat">Kategorie</div>
        <h2 class="tipp-title" id="modalTitle" style="font-size:2rem;margin:0;">Titel</h2>
      </div>
      <div class="tipp-modal-body">
        <p id="modalBody">Body content</p>
        <div class="tipp-action-box">
          <h4>🔥 Umsetzungstipp</h4>
          <p id="modalAction" style="margin:0;"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const tipsData = [
      { cat: 'Webseite', icon: '🌐', title: 'Telefonnummer im Header — klickbar auf Mobil', impact: 'hoch', body: 'Ueber 70 % der Interessenten suchen auf dem Smartphone. Eine sichtbare, klickbare Nummer (tel:-Link) direkt im Header senkt die Abbruchrate drastisch. <strong>Viele Sicherheitsfirmen verstecken ihren Kontakt im Footer</strong> — ein echter Conversion-Killer.', action: 'Umsetzbar in unter 1 Stunde, auch ohne Webdesigner.' },
      { cat: 'Webseite', icon: '🌐', title: 'Google-Bewertungen sichtbar einbinden', impact: 'hoch', body: 'Sicherheit ist Vertrauenssache. Wer 4,6+ Sterne bei Google hat und diese <strong>nirgendwo auf der Website zeigt</strong>, verschenkt massiv Vertrauen. Ein simpler Widget oder Screenshot mit Sternebewertung + Anzahl direkt unter dem Hero-Bereich erhoeht die Anfragerate messbar.', action: 'Kostenlosen Google Review Widget einbinden oder direkt mit Screenshot arbeiten.' },
      { cat: 'Webseite', icon: '🌐', title: 'Ladezeit unter 3 Sekunden', impact: 'hoch', body: 'Laut Google verlassen 53 % der Nutzer eine Seite, wenn sie laenger als 3 Sekunden laedt. Gerade Sicherheitswebsites laden oft durch schlechte Bildoptimierung langsam. <strong>PageSpeed Insights</strong> zeigt sofort, was verbesserbar ist.', action: 'Bilder komprimieren und unnoetige Skripte ausmisten.' },
      { cat: 'Google Ads', icon: '📣', title: 'Negative Keywords einpflegen', impact: 'hoch', body: 'Ohne Ausschluss-Keywords zahlen Sicherheitsfirmen fuer Suchanfragen wie "Sicherheitsdienst Ausbildung" oder "Sicherheitskurs kostenlos". <strong>Bis zu 30 % des Budgets versickert</strong> so in unpassende Klicks.', action: 'Suchanfragebericht woechentlich pruefen und irrelevante Begriffe ausschliessen.' },
      { cat: 'Meta Ads', icon: '📱', title: 'Video statt Bild', impact: 'hoch', body: 'Facebook- und Instagram-Ads mit Video erzielen oft deutlich mehr Aufmerksamkeit als reine Bildanzeigen. Ein 15-Sekunden-Clip vom Team oder Einsatzfahrzeug reicht oft schon aus.', action: '1 kurzes Video mit dem Smartphone drehen und mit Untertiteln versehen.' },
      { cat: 'Kein Budget', icon: '✅', title: 'Google Business Profil vollstaendig ausfuellen', impact: 'hoch', body: 'Wer bei Google Maps ganz oben erscheinen will, muss sein Google-Business-Profil <strong>vollstaendig ausfuellen: Oeffnungszeiten, Fotos, Leistungen, Kurzbeschreibung</strong>. Ein gepflegtes Profil bekommt deutlich mehr Klicks.', action: 'Alle Felder ausfuellen und mindestens 5 aktuelle Fotos hochladen.' }
    ];

    const cats = ['Alle', ...new Set(tipsData.map(t => t.cat))];
    let activeCat = 'Alle';

    function renderFilters() {
      const container = document.getElementById('tippsFilters');
      container.innerHTML = cats.map(c => 
        `<button class="tipps-filter-btn ${c === activeCat ? 'active' : ''}" data-cat="${c}">
          ${c} <span>${c === 'Alle' ? tipsData.length : tipsData.filter(t=>t.cat===c).length}</span>
        </button>`
      ).join('');

      container.querySelectorAll('.tipps-filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          activeCat = e.currentTarget.dataset.cat;
          renderFilters();
          renderGrid();
        });
      });
    }

    function renderGrid() {
      const grid = document.getElementById('tippsGrid');
      const filtered = activeCat === 'Alle' ? tipsData : tipsData.filter(t => t.cat === activeCat);
      document.getElementById('tippsCount').textContent = `${filtered.length} Tipps gefunden`;
      
      grid.innerHTML = filtered.map((tip, i) => `
        <article class="tipp-card" data-index="${tipsData.indexOf(tip)}" style="animation: pageIn 0.4s ease forwards; animation-delay: ${i*0.05}s; opacity: 0;">
          <div class="tipp-icon">${tip.icon}</div>
          <div class="tipp-category">${tip.cat}</div>
          <h3 class="tipp-title">${tip.title}</h3>
          <p class="tipp-excerpt">${tip.body.replace(/<[^>]+>/g, '')}</p>
          <div class="tipp-footer">
            <span style="color:var(--muted)">Impact: ${tip.impact}</span>
            <span class="tipp-read-more">Lesen <span style="font-size:1.2em">→</span></span>
          </div>
        </article>
      `).join('');

      grid.querySelectorAll('.tipp-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.index));
      });
    }

    const modal = document.getElementById('tippModal');
    function openModal(index) {
      const tip = tipsData[index];
      document.getElementById('modalCat').textContent = tip.cat;
      document.getElementById('modalTitle').textContent = tip.title;
      document.getElementById('modalBody').innerHTML = tip.body;
      document.getElementById('modalAction').innerHTML = tip.action;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('tippModalClose').addEventListener('click', () => {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    renderFilters();
    renderGrid();
  </script>
</body>
</html>
